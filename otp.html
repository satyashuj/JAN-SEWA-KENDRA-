<!DOCTYPE html>
<html>
<head>
<title>OTP Verification</title>

<style>
body{font-family:Arial;background:#fff8dc;}
.box{
  width:300px;
  margin:100px auto;
  background:#ffeb99;
  padding:20px;
  border-radius:10px;
  text-align:center;
}
input,button{
  width:100%;
  padding:10px;
  margin:8px 0;
}
button{
  background:#f4b400;
  border:none;
}
</style>

<script>
let otp;

function sendOTP(){
  otp = Math.floor(1000 + Math.random()*9000);
  alert("Your OTP is: " + otp);
}

function verifyOTP(){
  let userOtp = document.getElementById("otp").value;
  if(userOtp == otp){
    alert("OTP Verified Successfully");
  }else{
    alert("Invalid OTP");
  }
}
</script>
</head>

<body>

<div class="box">
<h2>OTP Verification</h2>
<input type="text" placeholder="Mobile Number">
<button onclick="sendOTP()">Send OTP</button>

<input type="text" id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify OTP</button>
</div>

</body>
</html>
