<!DOCTYPE html>
<html>
<head>
<title>PDF Receipt</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<style>
body{font-family:Arial;background:#fff8dc;}
#receipt{
  width:350px;
  margin:40px auto;
  background:#ffeb99;
  padding:20px;
  border-radius:10px;
}
button{
  width:100%;
  padding:10px;
  background:#f4b400;
  border:none;
  font-weight:bold;
}
</style>

<script>
function downloadPDF(){
  html2pdf(document.getElementById("receipt"));
}
</script>
</head>

<body>

<div id="receipt">
<h2>Jan Seva Kendra</h2>
<p>Application ID: JSK123</p>
<p>Name: Suresh Kumar</p>
<p>Service: PAN Card</p>
<p>Status: Submitted</p>
<p>Date: 2025</p>
</div>

<button onclick="downloadPDF()">Download PDF Receipt</button>

</body>
</html>
